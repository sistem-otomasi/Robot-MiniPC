# Robot Configuration
# RoboTwin Platform - Robot Core System

robot:
  id: "robot-001"
  name: "RoboTwin Mobile Robot"
  type: "differential"  # differential, mecanum, omni, ackermann
  serial_number: "RTM-001-2024"
  
  # Physical parameters
  physical:
    wheel_radius: 0.05        # meters
    wheel_base: 0.3           # meters (distance between wheels)
    wheel_separation: 0.3     # meters (for differential drive)
    max_linear_velocity: 1.0  # m/s
    max_angular_velocity: 2.0 # rad/s
    
  # Control loop frequency
  control_frequency: 50       # Hz

# Server Connection
server:
  url: "ws://localhost:3000/ws/robot"
  # url: "wss://robotwin.example.com/ws/robot"
  reconnect_interval: 5       # seconds
  heartbeat_interval: 10      # seconds
  
# Motors Configuration
motors:
  type: "dc_encoder"          # dc_encoder, stepper, servo
  driver: "serial"            # serial, i2c, gpio, can
  
  serial:
    port: "/dev/ttyUSB0"
    baudrate: 115200
    
  # Motor specifications
  left_motor:
    id: 1
    reversed: false
    encoder_ppr: 1200         # pulses per revolution
    gear_ratio: 30
    
  right_motor:
    id: 2
    reversed: true
    encoder_ppr: 1200
    gear_ratio: 30
    
  # PID for motor velocity control
  velocity_pid:
    kp: 1.0
    ki: 0.1
    kd: 0.01
    output_min: -255
    output_max: 255
    
  # PID for position control (optional)
  position_pid:
    kp: 2.0
    ki: 0.0
    kd: 0.5
    output_min: -1.0
    output_max: 1.0

# Sensors Configuration
sensors:
  # LIDAR
  lidar:
    enabled: true
    type: "rplidar"           # rplidar, hokuyo, ydlidar, sick
    port: "/dev/ttyUSB1"
    baudrate: 115200
    frame_id: "laser"
    scan_frequency: 10        # Hz
    
  # Camera
  camera:
    enabled: true
    type: "usb"               # usb, csi, rtsp
    device_id: 0
    width: 640
    height: 480
    fps: 30
    frame_id: "camera"
    
    # Compression for streaming
    streaming:
      enabled: true
      quality: 80             # JPEG quality
      max_fps: 15
      
  # IMU
  imu:
    enabled: true
    type: "mpu6050"           # mpu6050, bno055, mpu9250
    i2c_bus: 1
    address: 0x68
    frame_id: "imu"
    publish_frequency: 100    # Hz
    
    # Calibration (run calibration script to get these values)
    calibration:
      gyro_offset: [0.0, 0.0, 0.0]
      accel_offset: [0.0, 0.0, 0.0]
      mag_offset: [0.0, 0.0, 0.0]
      
  # Encoders (if separate from motor driver)
  encoders:
    enabled: false
    type: "quadrature"
    left:
      pin_a: 17
      pin_b: 27
    right:
      pin_a: 22
      pin_b: 23
      
  # Ultrasonic sensors (optional)
  ultrasonic:
    enabled: false
    sensors:
      - name: "front"
        trigger_pin: 5
        echo_pin: 6
      - name: "rear"
        trigger_pin: 13
        echo_pin: 19
        
  # Battery monitoring
  battery:
    enabled: true
    type: "adc"               # adc, i2c, serial
    adc_channel: 0
    voltage_divider_ratio: 5.7
    min_voltage: 10.0
    max_voltage: 12.6
    low_voltage_warning: 11.0

# Control Configuration
control:
  # Heading PID (for maintaining direction)
  heading_pid:
    kp: 1.5
    ki: 0.0
    kd: 0.2
    
  # Navigation PID
  navigation_pid:
    linear_kp: 0.5
    linear_ki: 0.0
    linear_kd: 0.1
    angular_kp: 1.0
    angular_ki: 0.0
    angular_kd: 0.1

# Filter Configuration
filters:
  # Low-pass filter for velocity smoothing
  velocity_lpf:
    enabled: true
    cutoff_frequency: 5.0     # Hz
    
  # Kalman filter for odometry
  odometry_kalman:
    enabled: true
    process_noise: 0.01
    measurement_noise: 0.1
    
  # Complementary filter for IMU fusion
  imu_complementary:
    enabled: true
    alpha: 0.98               # Weight for gyroscope

# SLAM Configuration (optional)
slam:
  enabled: false
  type: "cartographer"        # cartographer, gmapping, hector
  map_resolution: 0.05        # meters per pixel
  map_size: [200, 200]        # pixels

# Navigation Configuration
navigation:
  enabled: false
  planner: "dwa"              # dwa, a_star, rrt
  
  # Dynamic Window Approach parameters
  dwa:
    max_speed: 0.5
    max_angular_speed: 1.0
    acc_lim_linear: 0.5
    acc_lim_angular: 2.0
    goal_tolerance: 0.1
    
  # Obstacle avoidance
  obstacle_avoidance:
    enabled: true
    min_distance: 0.3         # meters
    stop_distance: 0.15       # meters

# Transforms (TF)
transforms:
  base_link_to_laser:
    x: 0.1
    y: 0.0
    z: 0.15
    roll: 0.0
    pitch: 0.0
    yaw: 0.0
    
  base_link_to_camera:
    x: 0.12
    y: 0.0
    z: 0.2
    roll: 0.0
    pitch: 0.15              # 15 degree tilt down
    yaw: 0.0
    
  base_link_to_imu:
    x: 0.0
    y: 0.0
    z: 0.1
    roll: 0.0
    pitch: 0.0
    yaw: 0.0

# Telemetry Configuration
telemetry:
  publish_frequency: 10       # Hz
  
  # What to publish
  publish:
    odometry: true
    velocity: true
    battery: true
    imu: true
    lidar: true
    camera: true
    diagnostics: true
    
# Logging
logging:
  level: "INFO"               # DEBUG, INFO, WARNING, ERROR
  console: true
  file:
    enabled: true
    path: "logs/"
    max_size: "10MB"
    backup_count: 5
    
# Diagnostics
diagnostics:
  enabled: true
  publish_frequency: 1        # Hz
  
  # Thresholds
  thresholds:
    cpu_warning: 80           # percent
    memory_warning: 80        # percent
    temperature_warning: 70   # celsius
